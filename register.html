

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS · Register</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03060f;
  --surface: #080f1e;
  --surface2: #0c1628;
  --border: rgba(0,210,255,.12);
  --border-bright: rgba(0,210,255,.4);
  --accent: #00d2ff;
  --accent2: #7b5ea7;
  --success: #00e5a0;
  --danger: #ff4d6d;
  --warn: #f59e0b;
  --text: #e8f4f8;
  --muted: rgba(232,244,248,.45);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; background-color: var(--bg); color: var(--text);
  overflow: hidden; position: relative;
}
.grid-bg {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,210,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,210,255,.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
.orb {
  position: fixed; border-radius: 50%; filter: blur(90px); opacity: .22; z-index: 0;
  animation: drift 22s ease-in-out infinite;
}
.orb1 { width: 450px; height: 450px; background: #7b5ea7; top: -150px; right: -100px; }
.orb2 { width: 380px; height: 380px; background: #00d2ff; bottom: -150px; left: -80px; animation-delay: -10s; }
@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(25px,-25px) scale(1.04); }
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 1;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.04) 0px, rgba(0,0,0,.04) 1px, transparent 1px, transparent 3px);
  pointer-events: none;
}
.wrapper {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: 28px;
  animation: fadeUp .6s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
.logo {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Space Mono', monospace; font-size: 13px;
  color: var(--muted); letter-spacing: .2em; text-transform: uppercase;
}
.logo-icon {
  width: 38px; height: 38px; border: 1.5px solid var(--border-bright);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; background: rgba(0,210,255,.06);
  box-shadow: 0 0 20px rgba(0,210,255,.15), inset 0 0 15px rgba(0,210,255,.05);
}
.card {
  width: 440px;
  background: linear-gradient(145deg, var(--surface), var(--surface2));
  border: 1px solid var(--border); border-radius: 24px;
  padding: 44px 40px;
  box-shadow: 0 0 0 1px rgba(0,210,255,.05), 0 40px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.04);
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent2), transparent); opacity: .7;
}
.card-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: -.5px; }
.card-sub {
  font-size: 13px; color: var(--muted); font-family: 'Space Mono', monospace;
  margin-bottom: 32px; letter-spacing: .05em;
}
.field { position: relative; margin-bottom: 16px; }
.field label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px; font-family: 'Space Mono', monospace;
}
.field input {
  width: 100%; padding: 14px 46px 14px 18px;
  background: rgba(0,0,0,.45); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 15px; transition: all .2s ease;
}
.field input::placeholder { color: rgba(232,244,248,.25); }
.field input:focus {
  outline: none; border-color: var(--accent);
  background: rgba(0,210,255,.04);
  box-shadow: 0 0 0 3px rgba(0,210,255,.12);
}
.field input.match { border-color: var(--success); box-shadow: 0 0 0 3px rgba(0,229,160,.1); }
.field input.no-match { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,77,109,.1); }
.eye-btn {
  position: absolute; right: 14px; bottom: 14px;
  background: none; border: none; color: var(--muted); cursor: pointer; font-size: 17px;
  padding: 0; transition: color .2s;
}
.eye-btn:hover { color: var(--accent); }

/* Strength bar */
.strength-bar { height: 3px; border-radius: 2px; margin-top: 8px; background: rgba(255,255,255,.06); overflow: hidden; }
.strength-fill { height: 100%; border-radius: 2px; transition: width .35s ease, background .35s ease; width: 0; }

.btn-register {
  width: 100%; margin-top: 8px; padding: 15px;
  border: none; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent2) 0%, #5a3f8a 100%);
  color: #fff; font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 800; cursor: pointer;
  letter-spacing: .08em;
  box-shadow: 0 8px 30px rgba(123,94,167,.4);
  transition: all .25s ease;
  position: relative; overflow: hidden;
}
.btn-register:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.btn-register:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(123,94,167,.55); }
.btn-register::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
  transition: left .5s;
}
.btn-register:not(:disabled):hover::before { left: 100%; }

.error-msg { margin-top: 14px; font-size: 13px; color: var(--danger); font-family: 'Space Mono', monospace; min-height: 20px; }
.success-msg { margin-top: 14px; font-size: 13px; color: var(--success); font-family: 'Space Mono', monospace; min-height: 20px; }

.login-link {
  margin-top: 22px; text-align: center; font-size: 13px; color: var(--muted);
  cursor: pointer; font-family: 'Space Mono', monospace;
}
.login-link span { color: var(--accent); font-weight: 700; border-bottom: 1px solid transparent; transition: border-color .2s; }
.login-link:hover span { border-color: var(--accent); }
.footer-tag { font-family: 'Space Mono', monospace; font-size: 11px; color: rgba(232,244,248,.2); letter-spacing: .15em; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrapper">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <span>IDS &nbsp;·&nbsp; Intrusion Detection System</span>
  </div>

  <div class="card">
    <div class="card-title">Create account</div>
    <div class="card-sub">// NEW_USER · REGISTER</div>

    <form id="registerForm">
      <div class="field">
        <label>Username</label>
        <input id="username" placeholder="Choose a username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <button type="button" class="eye-btn" onclick="togglePwd('password')">👁</button>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="••••••••" required>
        <button type="button" class="eye-btn" onclick="togglePwd('confirm')">👁</button>
      </div>
      <button type="submit" class="btn-register" id="submitBtn" disabled>CREATE ACCOUNT →</button>
    </form>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="login-link" onclick="window.location.href='login.html'">
      Already have an account? <span>Login →</span>
    </div>
  </div>

  <div class="footer-tag">IDS_PLATFORM · v2.0 · SECURE</div>
</div>

<script>
const pwdEl = document.getElementById('password');
const cfmEl = document.getElementById('confirm');
const btn = document.getElementById('submitBtn');
const fillEl = document.getElementById('strengthFill');
const errEl = document.getElementById('errorMsg');
const okEl = document.getElementById('successMsg');

function togglePwd(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

function strengthColor(score) {
  const colors = ['#ff4d6d','#ff4d6d','#f59e0b','#00e5a0','#00d2ff'];
  return colors[score] || '#ff4d6d';
}

function calcStrength(pw) {
  let s = 0;
  if (pw.length >= 6) s++;
  if (pw.length >= 10) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return Math.min(s, 4);
}

function checkMatch() {
  const p = pwdEl.value, c = cfmEl.value;
  const s = calcStrength(p);
  fillEl.style.width = p ? (s / 4 * 100) + '%' : '0';
  fillEl.style.background = p ? strengthColor(s) : '';

  cfmEl.classList.remove('match','no-match');
  if (c && p === c) cfmEl.classList.add('match');
  else if (c) cfmEl.classList.add('no-match');

  btn.disabled = !(p && c && p === c);
}

pwdEl.addEventListener('input', checkMatch);
cfmEl.addEventListener('input', checkMatch);

document.getElementById('registerForm').onsubmit = async e => {
  e.preventDefault();
  errEl.textContent = ''; okEl.textContent = '';
  try {
    const res = await fetch('http://localhost:5000/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username.value.trim(), password: pwdEl.value.trim(), role: 'user' })
    });
    if (!res.ok) throw 0;
    okEl.textContent = '✓  Account created — redirecting...';
    setTimeout(() => window.location.href = 'login.html', 1200);
  } catch {
    errEl.textContent = '✗  Username already exists';
  }
};
</script>
</body>
</html>

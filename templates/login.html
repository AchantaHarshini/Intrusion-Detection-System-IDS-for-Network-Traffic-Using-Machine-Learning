<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS · Login</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#03060f;
--surface:#080f1e;
--surface2:#0c1628;
--border:rgba(0,210,255,.12);
--border-bright:rgba(0,210,255,.4);
--accent:#00d2ff;
--danger:#ff4d6d;
--text:#e8f4f8;
--muted:rgba(232,244,248,.45);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Syne',sans-serif;
background:var(--bg);
color:var(--text);
}

.wrapper{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-family:'Space Mono',monospace;
font-size:13px;
color:var(--muted);
}

.logo-icon{
width:36px;
height:36px;
border:1px solid var(--border-bright);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,210,255,.05);
}

.card{
width:420px;
background:linear-gradient(145deg,var(--surface),var(--surface2));
border:1px solid var(--border);
border-radius:20px;
padding:40px;
}

.card-title{
font-size:26px;
font-weight:800;
margin-bottom:5px;
}

.card-sub{
font-size:13px;
color:var(--muted);
margin-bottom:25px;
font-family:'Space Mono',monospace;
}

.role-toggle{
display:flex;
gap:4px;
background:#000;
border-radius:50px;
padding:4px;
margin-bottom:25px;
}

.role-btn{
flex:1;
border:none;
background:none;
padding:10px;
border-radius:50px;
color:var(--muted);
cursor:pointer;
}

.role-btn.active{
background:linear-gradient(135deg,#00d2ff,#0088bb);
color:#000;
}

.field{
margin-bottom:16px;
}

.field label{
font-size:11px;
letter-spacing:.1em;
color:var(--muted);
display:block;
margin-bottom:6px;
}

.field input{
width:100%;
padding:12px;
background:#000;
border:1px solid var(--border);
border-radius:10px;
color:#fff;
}

.btn-login{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#00d2ff,#0090c0);
font-weight:700;
cursor:pointer;
}

.error-msg{
margin-top:10px;
color:var(--danger);
font-size:13px;
}

.register-link{
margin-top:18px;
text-align:center;
color:var(--muted);
cursor:pointer;
}

.register-link span{
color:var(--accent);
}

</style>
</head>

<body>

<div class="wrapper">

<div class="logo">
<div class="logo-icon">🛡️</div>
<span>IDS · Intrusion Detection System</span>
</div>

<div class="card">

<div class="card-title" id="cardTitle">Welcome back</div>
<div class="card-sub" id="cardSub">// USER_ACCESS · AUTHENTICATE</div>

<div class="role-toggle">
<button class="role-btn active" id="userBtn" onclick="setRole('user')">User</button>
<button class="role-btn" id="adminBtn" onclick="setRole('admin')">Admin</button>
</div>

<form id="loginForm">

<div class="field">
<label>Username</label>
<input id="username" required>
</div>

<div class="field">
<label>Password</label>
<input type="password" id="password" required>
</div>

<button class="btn-login">LOGIN</button>

</form>

<div class="error-msg" id="errorMsg"></div>

<div class="register-link" onclick="goRegister()">
No account? <span>Create one →</span>
</div>

</div>

</div>

<script>

let role="user";

function setRole(r){
role=r;
document.getElementById("userBtn").classList.toggle("active",r==="user");
document.getElementById("adminBtn").classList.toggle("active",r==="admin");
}

function goRegister(){
window.location.href="/register";
}

document.getElementById("loginForm").onsubmit=async e=>{

e.preventDefault();

const err=document.getElementById("errorMsg");
err.textContent="";

try{

const res=await fetch("/login",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:username.value,
password:password.value,
role
})
});

if(!res.ok) throw new Error();

const data=await res.json();

window.location.href=data.redirect;

}catch{
err.textContent="Invalid credentials";
}

};

</script>

</body>
</html>

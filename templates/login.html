<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS · Login</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
background:#030610;
font-family:'Syne',sans-serif;
color:#ede9fe;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:#08101f;
padding:40px;
border-radius:20px;
width:360px;
box-shadow:0 20px 60px rgba(0,0,0,.5);
}

h1{
font-size:24px;
margin-bottom:20px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#0b1726;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#7b5ea7,#a78bfa);
color:white;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:.9;
}

a{
display:block;
margin-top:15px;
text-align:center;
color:#a78bfa;
text-decoration:none;
}

.error{
color:#ff4d6d;
text-align:center;
margin-bottom:10px;
}

.logo{
text-align:center;
margin-bottom:20px;
font-family:'Space Mono',monospace;
letter-spacing:2px;
font-size:12px;
color:#a78bfa;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
🛡 IDS SYSTEM
</div>

<h1>Login</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="/login">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="/register">Create new account</a>

</div>

</body>
</html>

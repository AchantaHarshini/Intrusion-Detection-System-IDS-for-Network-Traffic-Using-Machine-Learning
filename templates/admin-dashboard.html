<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS · Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- KEEP YOUR ORIGINAL CSS HERE (UNCHANGED) -->

</head>
<body>

<div class="bg-canvas"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<header>
  <div class="header-brand">
    <div class="header-icon">🛡️</div>
    <div>
      <div class="header-title">IDS Professional</div>
      <div class="header-sub">ADMIN CONTROL PANEL</div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:14px;">
    <div class="admin-badge">⚙️ ADMIN ACCESS</div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>


<div class="layout">

<nav class="sidebar">

<div class="sidebar-section">Navigation</div>

<div class="nav-item active" onclick="show('welcome',this)">
<span class="nav-icon">👋</span> Welcome
</div>

<div class="nav-item" onclick="show('load',this)">
<span class="nav-icon">📂</span> Load Dataset
</div>

<div class="nav-item" onclick="show('target',this)">
<span class="nav-icon">🎯</span> Target Creation
</div>

<div class="nav-item" onclick="show('split',this)">
<span class="nav-icon">✂️</span> Train–Test Split
</div>

<div class="nav-item" onclick="show('scale',this)">
<span class="nav-icon">⚖️</span> Feature Scaling
</div>

<div class="nav-item" onclick="show('smote',this)">
<span class="nav-icon">⚡</span> SMOTE
</div>

<div class="nav-item" onclick="show('rf',this)">
<span class="nav-icon">🌳</span> Random Forest
</div>

<div class="sidebar-section">Analysis</div>

<div class="nav-item" onclick="show('eval',this)">
<span class="nav-icon">📊</span> Evaluation
</div>

<div class="nav-item" onclick="show('uploads',this)">
<span class="nav-icon">📁</span> User Uploads
</div>

<div class="nav-item" onclick="show('live',this)">
<span class="nav-icon">📡</span> Live Traffic
</div>

</nav>


<main class="main">
<div id="content" class="card"></div>
</main>

</div>

<div id="toast"></div>


<script>

const API = window.location.origin
let evalCharts = {}
let liveChart


function showToast(msg){
const t=document.getElementById("toast")
t.textContent=msg
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),2800)
}


function show(tab,el){

document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"))
el.classList.add("active")

Object.values(evalCharts).forEach(c=>c?.destroy())
evalCharts={}

const c=document.getElementById("content")


if(tab==="welcome"){

c.innerHTML=`
<div class="card-heading">👋 Admin Dashboard <span class="badge">IDS v2.0</span></div>

<div class="card-desc">
Full control over the ML pipeline, model evaluation, and system monitoring.
</div>
`

}


else if(tab==="live"){

c.innerHTML=`

<div class="card-heading">📡 Live Attack Detection</div>

<div class="card-desc">
Real-time intrusion monitoring from network traffic.
</div>

<div class="chart-box full">
<div class="chart-label">Live Attack vs Normal Traffic</div>

<div class="chart-canvas-wrap tall">
<canvas id="liveChart"></canvas>
</div>

</div>
`

setTimeout(startLiveChart,200)

}



else if(tab==="uploads"){

c.innerHTML=`

<div class="card-heading">
📁 User Uploads <span class="badge">LIVE</span>
</div>

<div class="card-desc">
All files uploaded by users — click Analyze to run ML detection on any file.
</div>

<button class="btn-primary" onclick="loadUploads()">🔄 Refresh</button>

<div id="uploadsTableWrap" style="margin-top:20px">
Loading uploads...
</div>
`

loadUploads()

}

}



function startLiveChart(){

const ctx=document.getElementById("liveChart").getContext("2d")

liveChart=new Chart(ctx,{
type:"line",

data:{
labels:[],
datasets:[
{
label:"Attacks",
borderColor:"#ff4d6d",
backgroundColor:"rgba(255,77,109,.15)",
data:[]
},
{
label:"Normal Traffic",
borderColor:"#00e5a0",
backgroundColor:"rgba(0,229,160,.15)",
data:[]
}
]
},

options:{
responsive:true,
maintainAspectRatio:false,
animation:false
}

})

setInterval(loadLiveData,3000)

}


async function loadLiveData(){

const res=await fetch(`${API}/live`)
const data=await res.json()

if(liveChart.data.labels.length>15){

liveChart.data.labels.shift()
liveChart.data.datasets[0].data.shift()
liveChart.data.datasets[1].data.shift()

}

liveChart.data.labels.push(data.time)
liveChart.data.datasets[0].data.push(data.attacks)
liveChart.data.datasets[1].data.push(data.normal)

liveChart.update()

}


async function loadUploads(){

const wrap=document.getElementById("uploadsTableWrap")

try{

const res=await fetch(`${API}/admin/uploads`)
const rows=await res.json()

wrap.innerHTML="<pre>"+JSON.stringify(rows,null,2)+"</pre>"

}catch{

wrap.innerHTML="Error loading uploads"

}

}


function exportEvalPDF(){

html2pdf().from(document.querySelector(".main")).set({
filename:"IDS_Evaluation_Report.pdf",
jsPDF:{format:"a4"},
html2canvas:{scale:2}
}).save()

showToast("PDF export started")

}


function logout(){
window.location.href="/"
}


show("welcome",document.querySelector(".nav-item.active"))

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS · Register</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#03060f;
--surface:#080f1e;
--surface2:#0c1628;
--border:rgba(0,210,255,.12);
--border-bright:rgba(0,210,255,.4);
--accent:#00d2ff;
--danger:#ff4d6d;
--text:#e8f4f8;
--muted:rgba(232,244,248,.45);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Syne',sans-serif;
background:var(--bg);
color:var(--text);
}

.wrapper{
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-family:'Space Mono',monospace;
font-size:13px;
color:var(--muted);
}

.logo-icon{
width:36px;
height:36px;
border:1px solid var(--border-bright);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,210,255,.05);
}

.card{
width:420px;
background:linear-gradient(145deg,var(--surface),var(--surface2));
border:1px solid var(--border);
border-radius:20px;
padding:40px;
}

.card-title{
font-size:26px;
font-weight:800;
margin-bottom:5px;
}

.card-sub{
font-size:13px;
color:var(--muted);
margin-bottom:25px;
font-family:'Space Mono',monospace;
}

.field{
margin-bottom:16px;
}

.field label{
font-size:11px;
letter-spacing:.1em;
color:var(--muted);
display:block;
margin-bottom:6px;
}

.field input{
width:100%;
padding:12px;
background:#000;
border:1px solid var(--border);
border-radius:10px;
color:#fff;
}

.btn-register{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#00d2ff,#0090c0);
font-weight:700;
cursor:pointer;
}

.login-link{
margin-top:18px;
text-align:center;
color:var(--muted);
cursor:pointer;
}

.login-link span{
color:var(--accent);
}

.error{
color:var(--danger);
font-size:13px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="logo">
<div class="logo-icon">🛡️</div>
<span>IDS · Intrusion Detection System</span>
</div>

<div class="card">

<div class="card-title">Create Account</div>
<div class="card-sub">// REGISTER NEW USER</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form action="/register" method="POST">

<div class="field">
<label>Username</label>
<input type="text" name="username" placeholder="Enter username" required>
</div>

<div class="field">
<label>Password</label>
<input type="password" name="password" placeholder="Enter password" required>
</div>

<button class="btn-register">CREATE ACCOUNT</button>

</form>

<div class="login-link" onclick="goLogin()">
Already have an account? <span>Login →</span>
</div>

</div>

</div>

<script>

function goLogin(){
window.location.href="/";
}

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS · Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03060f;
  --surface: #080f1e;
  --surface2: #0c1628;
  --border: rgba(0,210,255,.12);
  --border-bright: rgba(0,210,255,.4);
  --accent: #00d2ff;
  --accent2: #7b5ea7;
  --danger: #ff4d6d;
  --text: #e8f4f8;
  --muted: rgba(232,244,248,.45);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  background-color: var(--bg);
  color: var(--text);
  overflow: hidden;
  position: relative;
}

/* Animated grid background */
.grid-bg {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,210,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,210,255,.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Floating orbs */
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); opacity: .25; z-index: 0;
  animation: drift 20s ease-in-out infinite;
}
.orb1 { width: 500px; height: 500px; background: #00d2ff; top: -200px; left: -150px; animation-delay: 0s; }
.orb2 { width: 400px; height: 400px; background: #7b5ea7; bottom: -200px; right: -100px; animation-delay: -8s; }
.orb3 { width: 300px; height: 300px; background: #00d2ff; bottom: 50px; left: 30%; animation-delay: -14s; opacity: .12; }

@keyframes drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -30px) scale(1.05); }
  66% { transform: translate(-20px, 20px) scale(.95); }
}

/* Scanline effect */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 1;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,.04) 0px,
    rgba(0,0,0,.04) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}

.wrapper {
  position: relative; z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  animation: fadeUp .6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Logo area */
.logo {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: .2em;
  text-transform: uppercase;
}
.logo-icon {
  width: 38px; height: 38px;
  border: 1.5px solid var(--border-bright);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  background: rgba(0,210,255,.06);
  box-shadow: 0 0 20px rgba(0,210,255,.15), inset 0 0 15px rgba(0,210,255,.05);
}

/* Card */
.card {
  width: 420px;
  background: linear-gradient(145deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 44px 40px;
  box-shadow:
    0 0 0 1px rgba(0,210,255,.05),
    0 40px 80px rgba(0,0,0,.7),
    inset 0 1px 0 rgba(255,255,255,.04);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: .6;
}

.card-title {
  font-size: 26px; font-weight: 800;
  margin-bottom: 6px;
  letter-spacing: -.5px;
}
.card-sub {
  font-size: 13px; color: var(--muted);
  font-family: 'Space Mono', monospace;
  margin-bottom: 32px;
  letter-spacing: .05em;
}

/* Role toggle */
.role-toggle {
  display: flex;
  background: rgba(0,0,0,.4);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}
.role-btn {
  flex: 1; padding: 10px 16px;
  border: none; background: transparent;
  border-radius: 50px;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all .25s ease;
  letter-spacing: .05em;
}
.role-btn.active {
  background: linear-gradient(135deg, var(--accent), #0099bb);
  color: var(--bg);
  box-shadow: 0 4px 20px rgba(0,210,255,.35);
}

/* Fields */
.field {
  position: relative;
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: 'Space Mono', monospace;
}
.field input {
  width: 100%;
  padding: 14px 46px 14px 18px;
  background: rgba(0,0,0,.45);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  transition: all .2s ease;
}
.field input::placeholder { color: rgba(232,244,248,.25); }
.field input:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(0,210,255,.04);
  box-shadow: 0 0 0 3px rgba(0,210,255,.12);
}
.eye-btn {
  position: absolute; right: 14px; bottom: 14px;
  background: none; border: none;
  color: var(--muted); cursor: pointer; font-size: 17px;
  padding: 0; transition: color .2s;
}
.eye-btn:hover { color: var(--accent); }

/* Submit */
.btn-login {
  width: 100%; margin-top: 8px;
  padding: 15px;
  border: none; border-radius: 12px;
  background: linear-gradient(135deg, #00d2ff 0%, #0088bb 100%);
  color: var(--bg);
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 800;
  cursor: pointer;
  letter-spacing: .08em;
  box-shadow: 0 8px 30px rgba(0,210,255,.35);
  transition: all .25s ease;
  position: relative; overflow: hidden;
}
.btn-login::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  transition: left .5s;
}
.btn-login:hover::before { left: 100%; }
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 40px rgba(0,210,255,.5);
}
.btn-login:active { transform: translateY(0); }

.error-msg {
  margin-top: 14px;
  font-size: 13px; color: var(--danger);
  font-family: 'Space Mono', monospace;
  min-height: 20px;
  display: flex; align-items: center; gap: 6px;
}

.register-link {
  margin-top: 22px;
  text-align: center;
  font-size: 13px; color: var(--muted);
  cursor: pointer;
  transition: color .2s;
  font-family: 'Space Mono', monospace;
}
.register-link span {
  color: var(--accent); font-weight: 700;
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.register-link:hover span { border-color: var(--accent); }

/* Footer */
.footer-tag {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: rgba(232,244,248,.2);
  letter-spacing: .15em;
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrapper">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <span>IDS &nbsp;·&nbsp; Intrusion Detection System</span>
  </div>

  <div class="card">
    <div class="card-title" id="cardTitle">Welcome back</div>
    <div class="card-sub" id="cardSub">// USER_ACCESS · AUTHENTICATE</div>

    <div class="role-toggle">
      <button class="role-btn active" id="userBtn" onclick="setRole('user')">👤 User</button>
      <button class="role-btn" id="adminBtn" onclick="setRole('admin')">⚙️ Admin</button>
    </div>

    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input id="username" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePwd()">👁</button>
      </div>
      <button type="submit" class="btn-login">LOGIN →</button>
    </form>

    <div class="error-msg" id="errorMsg"></div>

    <div class="register-link" onclick="goRegister()">
      No account? <span>Create one →</span>
    </div>
  </div>

  <div class="footer-tag">IDS_PLATFORM · v2.0 · SECURE</div>
</div>

<script>
let role = 'user';

function setRole(r) {
  role = r;
  document.getElementById('userBtn').classList.toggle('active', r === 'user');
  document.getElementById('adminBtn').classList.toggle('active', r === 'admin');
  document.getElementById('cardTitle').textContent = r === 'admin' ? 'Admin access' : 'Welcome back';
  document.getElementById('cardSub').textContent = r === 'admin' ? '// ADMIN_ACCESS · AUTHENTICATE' : '// USER_ACCESS · AUTHENTICATE';
}

function togglePwd() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
}

function goRegister() { window.location.href = 'register.html'; }

document.getElementById('loginForm').onsubmit = async e => {
  e.preventDefault();

  const errEl = document.getElementById('errorMsg');
  errEl.textContent = '';

  try {

    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
        role
      })
    });

    if (!res.ok) throw new Error();

    window.location.href = role === 'admin'
      ? 'admin-dashboard.html'
      : 'user-dashboard.html';

  } catch {
    errEl.textContent = '✗  Invalid credentials — please try again';
  }
};
</script>
</body>
</html>

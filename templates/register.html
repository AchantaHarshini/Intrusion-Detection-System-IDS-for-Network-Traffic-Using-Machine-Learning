<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDS · Register</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
background:#03060f;
color:#e8f4f8;
font-family:'Syne',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
width:420px;
background:#0c1628;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

h2{
margin-bottom:10px;
}

label{
font-size:12px;
display:block;
margin-top:20px;
color:#aaa;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #333;
background:#080f1e;
color:white;
}

button{
width:100%;
margin-top:25px;
padding:14px;
border:none;
border-radius:10px;
background:#7b5ea7;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#5a3f8a;
}

.error{
color:#ff4d6d;
margin-top:15px;
}

.login{
margin-top:20px;
font-size:13px;
text-align:center;
}

.login a{
color:#00d2ff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Create Account</h2>
<p style="color:#aaa">// NEW USER REGISTER</p>

<form action="/register" method="POST">

<label>Username</label>
<input type="text" name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<label>Confirm Password</label>
<input type="password" name="confirm_password" required>

<button type="submit">CREATE ACCOUNT</button>

</form>

<div class="login">
Already have an account?  
<a href="/">Login</a>
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – IDS</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"Inter","Segoe UI",sans-serif;
    background:#020617;
    overflow:hidden;
    color:#e5e7eb;
}

/* 🟣 AURORA BACKGROUND */
body::before{
    content:"";
    position:absolute;
    inset:-40%;
    background:
        radial-gradient(circle at 20% 30%, rgba(96,165,250,.25), transparent 40%),
        radial-gradient(circle at 80% 40%, rgba(49,46,129,.35), transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(56,189,248,.18), transparent 50%);
    animation:aurora 22s linear infinite;
    z-index:-1;
}

@keyframes aurora{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* ✨ GLASS CARD */
.card{
    width:380px;
    padding:46px 38px;
    border-radius:22px;
    background:linear-gradient(
        180deg,
        rgba(255,255,255,.08),
        rgba(255,255,255,.03)
    );
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 40px 90px rgba(0,0,0,.8);
    text-align:center;
}

.card h2{
    font-size:24px;
    margin-bottom:28px;
}

/* INPUTS */
input{
    width:100%;
    padding:14px 15px;
    margin:15px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.15);
    background:rgba(2,6,23,.85);
    color:#f9fafb;
    outline:none;
}
input::placeholder{color:#9ca3af;}
input:focus{
    border-color:#60a5fa;
    box-shadow:0 0 0 3px rgba(96,165,250,.25);
}

/* BUTTON */
button{
    margin-top:24px;
    width:100%;
    padding:14px;
    border-radius:30px;
    border:none;
    background:linear-gradient(135deg,#60a5fa,#2563eb);
    color:#020617;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 15px 35px rgba(37,99,235,.6);
}

p.info{color:#93c5fd;margin-top:16px;}
p.error{color:#f87171;margin-top:16px;}
</style>
</head>

<body>

<div class="card">
    <h2>IDS Login</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p class="error" id="errorMsg"></p>
    <p class="info" id="infoMsg"></p>
</div>

<script>
const API = "http://localhost:5000";

/* 🔐 AUTO REDIRECT IF ALREADY LOGGED IN */
const role = localStorage.getItem("role");
if(role === "admin"){
    window.location.href = "admin-dashboard.html";
}
if(role === "user"){
    window.location.href = "user-dashboard.html";
}

/* 🧹 CLEAR SESSION ONLY WHEN PAGE LOADS FRESH */
localStorage.removeItem("user_id");
localStorage.removeItem("role");
localStorage.removeItem("username");

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");
    const infoMsg = document.getElementById("infoMsg");

    errorMsg.innerText = "";
    infoMsg.innerText = "⏳ Connecting to server...";

    try {
        const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if(!res.ok){
            throw new Error(data.error || "Invalid credentials");
        }

        /* ✅ SAVE SESSION */
        localStorage.setItem("user_id", data.user_id);
        localStorage.setItem("role", data.role);
        localStorage.setItem("username", data.username);

        infoMsg.innerText = "✅ Login successful! Redirecting...";

        setTimeout(() => {
            if(data.role === "admin"){
                window.location.href = "admin-dashboard.html";
            } else {
                window.location.href = "user-dashboard.html";
            }
        }, 800);

    } catch (err) {
        console.error(err);
        infoMsg.innerText = "";
        errorMsg.innerText = "❌ Server not reachable or login failed";
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User – IDS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* { 
    box-sizing: border-box; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: 
        radial-gradient(ellipse at top left, rgba(120,119,198,.15) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(255,119,198,.15) 0%, transparent 50%),
        radial-gradient(ellipse at top right, rgba(120,219,255,.1) 0%, transparent 50%),
        linear-gradient(135deg, #0a0e17 0%, #1a1f2e 50%, #16213e 100%);
    color: #e2e8f0;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(circle at 20% 80%, rgba(120,119,198,.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,119,198,.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120,219,255,.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
}

header {
    padding: 24px 32px;
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    background: rgba(10,14,23,.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(120,119,198,.2);
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
}

header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, #00d4ff, #7b2cbf, #ff6b9d);
    border-radius: 2px;
}

.logout-btn {
    position: absolute;
    right: 28px;
    top: 24px;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    border: none;
    padding: 12px 24px;
    border-radius: 50px;
    color: white;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 0 8px 25px rgba(255,107,157,.3);
    backdrop-filter: blur(10px);
}

.logout-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(255,107,157,.4);
}

.container {
    display: flex;
    min-height: calc(100vh - 92px);
}

.sidebar {
    width: 280px;
    padding: 32px 24px;
    background: rgba(10,14,23,.95);
    backdrop-filter: blur(25px);
    border-right: 1px solid rgba(120,119,198,.15);
    box-shadow: 4px 0 40px rgba(0,0,0,.3);
}

.item {
    padding: 20px 24px;
    border-radius: 20px;
    background: rgba(255,255,255,.03);
    margin-bottom: 16px;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;
    border: 1px solid rgba(255,255,255,.08);
    position: relative;
    overflow: hidden;
}

.item::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
    transition: left 0.6s;
}

.item:hover::before {
    left: 100%;
}

.item.active {
    background: linear-gradient(135deg, #00d4ff, #0099cc, #7b2cbf);
    color: #fff;
    font-weight: 800;
    box-shadow: 0 12px 40px rgba(0,212,255,.4);
    border-color: rgba(0,212,255,.5);
    transform: translateX(4px);
}

.item.disabled {
    opacity: .5;
    pointer-events: none;
    cursor: not-allowed;
}

.main {
    flex: 1;
    padding: 40px;
}

.card {
    background: rgba(20,25,40,.9);
    backdrop-filter: blur(30px);
    padding: 40px;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,.15);
    box-shadow: 0 25px 50px -12px rgba(0,0,0,.6);
}

.chart-box {
    height: 320px;
    margin: 40px 0;
    background: rgba(20,25,40,.8);
    backdrop-filter: blur(25px);
    border-radius: 24px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,.15);
    display: flex;
    align-items: center;
    justify-content: center;
}

.chart-box canvas {
    max-height: 100% !important;
    width: 100% !important;
    height: 100% !important;
}

.loading {
    display: none;
    text-align: center;
    padding: 80px 40px;
}

.loading.active {
    display: block;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 5px solid rgba(0,212,255,.2);
    border-top: 5px solid #00d4ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 25px;
    position: relative;
}

.spinner::after {
    content: '';
    width: 35px;
    height: 35px;
    border: 4px solid rgba(0,212,255,.3);
    border-top: 4px solid #00d4ff;
    border-radius: 50%;
    position: absolute;
    top: 5px;
    left: 5px;
    animation: spin 0.8s linear infinite reverse;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin: 35px 0;
}

.metric {
    background: rgba(30,35,55,.9);
    backdrop-filter: blur(15px);
    padding: 24px;
    border-radius: 20px;
    text-align: center;
    border: 1px solid rgba(255,255,255,.12);
}

.metric h3 { 
    font-size: 28px; 
    font-weight: 800; 
    margin: 0 0 8px 0; 
}

.btn-primary {
    padding: 16px 32px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #00d4ff, #0099cc);
    font-weight: 700;
    font-size: 16px;
    color: white;
    cursor: pointer;
    box-shadow: 0 12px 35px rgba(0,212,255,.4);
}

.btn-primary:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 20px 45px rgba(0,212,255,.5); 
}

.btn-primary:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}

input[type="file"] {
    width: 100%;
    padding: 20px;
    border-radius: 20px;
    border: 2px dashed rgba(120,119,198,.5);
    background: rgba(30,35,55,.8);
    color: #e2e8f0;
    font-size: 16px;
    margin-bottom: 20px;
}
/* Exclude elements from PDF */
.no-print {
    display: none !important;
}

/* Ensure charts print properly */
.chart-container {
    page-break-inside: avoid;
    break-inside: avoid;
}

canvas {
    max-width: 100% !important;
}
</style>
</head>

<body>
<header>
🛡️ Intrusion Detection System – Professional Dashboard
<button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">
<div class="sidebar">
    <div class="item active" onclick="show('welcome',this)">👋 Welcome</div>
    <div class="item disabled" id="uploadNav" onclick="show('upload',this)">📂 Upload</div>
    <div class="item disabled" id="detectNav" onclick="show('detect',this)">🚨 Detect</div>
    <div class="item disabled" id="resultsNav" onclick="show('results',this)">📊 Results</div>
</div>

<div class="main">
<div id="content" class="card"></div>
</div>
</div>

<script>
Chart.register(ChartDataLabels);

const API="http://localhost:5000";
let predictionData = null;
let charts = {};

function enable(id){
    const element = document.getElementById(id);
    if(element) element.classList.remove("disabled");
}

function destroyCharts() {
    Object.values(charts).forEach(chart => {
        if (chart) chart.destroy();
    });
    charts = {};
}

function show(step,el){
    document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");
    const c = document.getElementById("content");
    destroyCharts();

    if(step==="welcome"){
        c.innerHTML=`<h2 style="color:#00d4ff">Welcome to IDS Pro</h2>
        <p style="font-size:18px;color:#a0a0a0">🚀 Follow the workflow: <strong>Upload → Detect → Results → PDF Export</strong></p>`;
        enable("uploadNav");
        return;
    }

    if(step==="upload"){
        c.innerHTML = `
            <h2 style="color:#00d4ff">📂 Upload Dataset</h2>
            <form id="uploadForm">
                <input type="file" id="fileInput" accept=".csv,.pcap" required>
                <button type="submit" class="btn-primary" id="uploadBtn">🚀 Upload Dataset</button>
            </form>
            <div class="loading" id="uploadLoad">
                <div class="spinner"></div>
                <p style="margin-top: 20px; font-size: 16px; color:#a0a0a0">Uploading to server...</p>
            </div>
        `;
        document.getElementById("uploadForm").onsubmit = uploadFile;
        return;
    }

    if(step==="detect"){
        c.innerHTML = `
            <h2 style="color:#00ff88">🚨 Run Intrusion Detection</h2>
            <p style="color: #a0a0a0; margin-bottom: 30px; font-size:16px">
                Click below to analyze your network traffic dataset using our ML models.
            </p>
            <button class="btn-primary" onclick="runDetection()" id="detectBtn" style="font-size: 18px; padding: 20px 40px;">
                🔍 Run Detection Analysis
            </button>
            <div class="loading" id="detectLoad">
                <div class="spinner"></div>
                <p style="margin-top: 20px; font-size: 16px; color:#a0a0a0">Analyzing network traffic with ML models...</p>
            </div>
        `;
        enable("resultsNav");
        return;
    }

    if(step==="results"){
        c.innerHTML=`<h2 style="color:#00ff88">📊 Detection Results</h2>

        <div class="metrics">
            <div class="metric">
                <h3 id="attacksCount" style="color:#ef4444">0</h3>
                <div style="font-size:14px;opacity:.9">🔴 Attacks Detected</div>
            </div>
            <div class="metric">
                <h3 id="normalCount" style="color:#10b981">0</h3>
                <div style="font-size:14px;opacity:.9">🟢 Normal Traffic</div>
            </div>
            <div class="metric total">
                <h3 id="totalRecords" style="color:#fbbf24">0</h3>
                <div style="font-size:14px;opacity:.9">📈 Total Records</div>
            </div>
        </div>

        <div class="chart-box"><canvas id="trafficChart"></canvas></div>
        <div class="chart-box"><canvas id="attackChart"></canvas></div>
        <div class="chart-box"><canvas id="confusionChart"></canvas></div>
        <div class="chart-box"><canvas id="rocChart"></canvas></div>

        <div style="text-align:center;margin:40px 0">
            <button class="btn-primary no-print" onclick="exportPDF()" style="font-size:18px;padding:20px 50px">📄 Download Professional PDF Report</button>
        </div>`;
        
        setTimeout(() => {
            updateMetrics();
            renderAllCharts();
        }, 200);
    }
}

function updateMetrics() {
    if (!predictionData) return;
    
    const attacksEl = document.getElementById('attacksCount');
    const normalEl = document.getElementById('normalCount');
    const totalEl = document.getElementById('totalRecords');
    
    if(attacksEl) attacksEl.textContent = (predictionData.attacks_detected || 0).toLocaleString();
    if(normalEl) normalEl.textContent = (predictionData.normal_detected || 0).toLocaleString();
    
    const totalRecords = (predictionData.attacks_detected || 0) + (predictionData.normal_detected || 0);
    if(totalEl) totalEl.textContent = totalRecords.toLocaleString();
}

async function uploadFile(e) {
    e.preventDefault();
    
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadLoad = document.getElementById("uploadLoad");
    
    uploadBtn.disabled = true;
    uploadBtn.textContent = "⏳ Processing...";
    uploadLoad.classList.add("active");
    
    const fileInput = document.getElementById('fileInput');
    const fd = new FormData();
    fd.append("file", fileInput.files[0]);
    
    try {
        const response = await fetch(`${API}/upload`, {method:"POST", body:fd});
        if (!response.ok) throw new Error('Upload failed');
        
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        enable("detectNav");
        show("detect", document.getElementById("detectNav"));
    } catch(e) {
        console.error(e);
        alert('Upload failed. Check if backend is running on localhost:5000');
        uploadBtn.disabled = false;
        uploadBtn.textContent = "🚀 Upload Dataset";
        uploadLoad.classList.remove("active");
    }
}

async function runDetection() {
    const detectBtn = document.getElementById("detectBtn");
    const detectLoad = document.getElementById("detectLoad");
    
    detectBtn.disabled = true;
    detectBtn.textContent = "🔍 Analyzing...";
    detectLoad.classList.add("active");
    
    try {
        const response = await fetch(`${API}/predict`);
        if (!response.ok) throw new Error('Prediction failed');
        
        predictionData = await response.json();

        // Demo data
        predictionData.attack_types = predictionData.attack_types || {
            "DoS": 125,
            "Probe": 45,
            "R2L": 23,
            "U2R": 8
        };
        
        predictionData.confusion_matrix = predictionData.confusion_matrix || {
            "TP": 950, "FP": 15, "FN": 25, "TN": 9850
        };

        predictionData.roc = predictionData.roc || {
            fpr: [0, 0.1, 0.2, 0.4, 0.6, 1],
            tpr: [0, 0.5, 0.7, 0.85, 0.95, 1],
            auc: 0.97
        };

        show("results", document.getElementById("resultsNav"));
    } catch(e) {
        console.error(e);
        alert('Detection failed. Check backend API at localhost:5000/predict');
        detectBtn.disabled = false;
        detectBtn.textContent = "🔍 Run Detection Analysis";
        detectLoad.classList.remove("active");
    }
}

function renderAllCharts() {
    destroyCharts();
    
    function createChart(canvasId, config) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        charts[canvasId] = new Chart(ctx, config);
    }

    // 1. Traffic Chart - WHITE TEXT
    if (predictionData) {
        createChart('trafficChart', {
            type: "doughnut",
            data: {
                labels: ["🔴 Attacks", "🟢 Normal"],
                datasets: [{
                    data: [predictionData.attacks_detected || 0, predictionData.normal_detected || 0],
                    backgroundColor: ["#ef4444", "#10b981"],
                    borderColor: ["#ffffff"],
                    borderWidth: 3,
                    cutout: '65%'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { 
                            color: '#ffffff', 
                            padding: 25, 
                            font: { size: 14, weight: '700' }
                        }
                    }
                }
            }
        });
    }

    // 2. Attack Types - WHITE TEXT
    if (predictionData?.attack_types) {
        createChart('attackChart', {
            type: "bar",
            data: {
                labels: Object.keys(predictionData.attack_types),
                datasets: [{
                    data: Object.values(predictionData.attack_types),
                    backgroundColor: "#00d4ff",
                    borderColor: "#ffffff",
                    borderWidth: 2,
                    borderRadius: 12,
                    borderSkipped: false,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        ticks: { color: '#ffffff' },
                        grid: { color: 'transparent' }
                    },
                    y: { 
                        beginAtZero: true,
                        ticks: { color: '#ffffff' },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // 3. Confusion Matrix - WHITE TEXT
    if (predictionData?.confusion_matrix) {
        createChart('confusionChart', {
            type: "bar",
            data: {
                labels: Object.keys(predictionData.confusion_matrix),
                datasets: [{
                    data: Object.values(predictionData.confusion_matrix),
                    backgroundColor: "#f59e0b",
                    borderColor: "#ffffff",
                    borderWidth: 2,
                    borderRadius: 12,
                    borderSkipped: false,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        ticks: { color: '#ffffff' },
                        grid: { color: 'transparent' }
                    },
                    y: { 
                        beginAtZero: true,
                        ticks: { color: '#ffffff' },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // 4. ROC Curve - WHITE TEXT
    if (predictionData?.roc) {
        createChart('rocChart', {
            type: "line",
            data: {
                labels: predictionData.roc.fpr.map(f => (f*100).toFixed(0)+'%'),
                datasets: [{
                    label: `ROC Curve (AUC = ${predictionData.roc.auc})`,
                    data: predictionData.roc.tpr,
                    borderColor: "#00ff88",
                    backgroundColor: "rgba(0,255,136,0.2)",
                    fill: true,
                    borderWidth: 4,
                    tension: 0.4,
                    pointBackgroundColor: "#00ff88",
                    pointBorderColor: "#ffffff",
                    pointBorderWidth: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: { 
                            display: true, 
                            text: "False Positive Rate (FPR)", 
                            color: '#ffffff',
                            font: { size: 14, weight: '700' }
                        },
                        ticks: { color: '#ffffff' },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    },
                    y: {
                        title: { 
                            display: true, 
                            text: "True Positive Rate (TPR)", 
                            color: '#ffffff',
                            font: { size: 14, weight: '700' }
                        },
                        min: 0,
                        max: 1,
                        ticks: { color: '#ffffff' },
                        grid: { color: 'rgba(255,255,255,0.1)' }
                    }
                },
                plugins: {
                    legend: {
                        labels: { 
                            color: '#ffffff', 
                            font: { size: 14, weight: '700' } 
                        }
                    }
                }
            }
        });
    }
}

function exportPDF() {

    // Disable animations & transitions
    const style = document.createElement('style');
    style.id = 'pdf-export-style';
    style.innerHTML = `
        * { transition: none !important; animation: none !important; }
        .no-print { display: none !important; }
        body { background: white !important; color: black !important; }
        .metric { background: #f8f9fa !important; color: black !important; }
        .metric h3 { color: #333 !important; }
        .chart-box { background: white !important; page-break-inside: avoid !important; }
        canvas { max-height: none !important; }
    `;
    document.head.appendChild(style);

    // Resize charts before export
    if (window.charts) {
        Object.values(charts).forEach(chart => {
            if (chart && chart.resize) chart.resize();
            if (chart && chart.update) chart.update('none');
        });
    }

    setTimeout(() => {

        // Clone content for clean export
        const element = document.querySelector('.main').cloneNode(true);

        // Remove interactive UI elements
        element.querySelectorAll('button, .sidebar, .no-print').forEach(e => e.remove());

        // Fix canvas height for PDF
        element.querySelectorAll('canvas').forEach(canvas => {
            canvas.style.height = '400px';
        });

        const options = {
            margin: [15, 10, 15, 10],
            filename: 'IDS_Professional_Report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff'
            },
            jsPDF: {
                unit: 'mm',
                format: 'a4',
                orientation: 'portrait'
            },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };

        html2pdf().set(options).from(element).save().then(() => {
            document.head.removeChild(style);
        }).catch(err => {
            console.error('PDF export failed', err);
            document.head.removeChild(style);
        });

    }, 1200);
}// Increased timeout for charts

function logout(){
    localStorage.clear();
    location.href="login.html";
}
function exportPDF(){
    html2pdf().from(document.querySelector(".main")).save("IDS_Report.pdf");
}


show("welcome", document.querySelector(".item.active"));
</script>
</body>
</html>
